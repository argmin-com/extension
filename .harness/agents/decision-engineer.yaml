name: decision-engineer
role: "Decision pipeline engineer"
description: |
  Owns the unified decision pipeline: recommendation engine, anomaly
  detection, budget tracking, task classification, policy engine, and
  event store. This is the strategic core -- turning passive tracking
  into active decision intelligence.

allowed_scopes:
  - "bg-components/decision-engine.js"
  - "bg-components/decision-orchestrator.js"
  - "bg-components/task-classifier.js"
  - "bg-components/policy-engine.js"
  - "bg-components/event-store.js"

forbidden_scopes:
  - "content-components/**"
  - "injections/**"
  - "popup.*"
  - "debug.*"
  - "background.js"
  - "bg-components/utils.js"

gates:
  - "node --check bg-components/decision-engine.js"
  - "node --check bg-components/decision-orchestrator.js"
  - "node --check bg-components/task-classifier.js"
  - "node --check bg-components/policy-engine.js"
  - "node --check bg-components/event-store.js"
  - "npm test"
  - "node scripts/audit-debug-privacy.js"

evidence_required: true

skills:
  - decision-pipeline

notes: |
  The decision pipeline follows: Observation -> Inference -> Policy -> Feedback.
  evaluateDecision() in decision-orchestrator.js is the unified entry point.
  task-classifier.js uses local rules-based classification (no external API).
