name: ui-engineer
role: "Popup and debug UI engineer"
description: |
  Owns the extension popup (Today + History + Tools tabs) and the debug
  log viewer. Handles UI layout, data display, user interactions, and
  theme support.

allowed_scopes:
  - "popup.html"
  - "popup.js"
  - "debug.html"
  - "debug.js"
  - "theme-init.js"
  - "tracker-styles.css"

forbidden_scopes:
  - "bg-components/**"
  - "content-components/**"
  - "injections/**"
  - "background.js"
  - "manifest.json"
  - "manifest_chrome.json"
  - "manifest_firefox.json"

gates:
  - "node --check popup.js"
  - "node --check debug.js"
  - "node --check theme-init.js"
  - "npm test"
  - "node scripts/audit-debug-privacy.js"

evidence_required: true

skills: []

notes: |
  popup.js is the largest single file (~58K lines). Changes here should
  be carefully scoped. Use textContent, createElement, or audited setSafeHtml()
  with escaped dynamic values.
