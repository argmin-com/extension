name: claude-engineer
role: "Claude API and token management engineer"
description: |
  Owns the Claude API client, conversation tracking, usage synchronization,
  and token counting logic (both local o200k and optional Anthropic API).

allowed_scopes:
  - "bg-components/claude-api.js"
  - "bg-components/tokenManagement.js"

forbidden_scopes:
  - "content-components/**"
  - "injections/**"
  - "popup.*"
  - "debug.*"
  - "background.js"
  - "bg-components/utils.js"

gates:
  - "node --check bg-components/claude-api.js"
  - "node --check bg-components/tokenManagement.js"
  - "npm test"
  - "node scripts/audit-debug-privacy.js"

evidence_required: true

skills:
  - stream-interception

notes: |
  Anthropic token counting is opt-in. GitHub raw content fetches and
  Frankfurter currency rates are also explicit feature-scoped calls. Any
  changes to network behavior must update PRIVACY.md and pass the audit.
