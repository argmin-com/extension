name: carbon-engineer
role: "Energy and carbon estimation engineer"
description: |
  Owns energy estimation using AI Energy Score benchmarks, carbon intensity
  calculations, grid data (EPA eGRID, EEA, IEA), receipts, and model
  comparison features.

allowed_scopes:
  - "bg-components/carbon-energy.js"

forbidden_scopes:
  - "content-components/**"
  - "injections/**"
  - "popup.*"
  - "debug.*"
  - "background.js"
  - "bg-components/utils.js"

gates:
  - "node --check bg-components/carbon-energy.js"
  - "npm test"
  - "node scripts/audit-debug-privacy.js"

evidence_required: true

skills: []

notes: |
  Carbon methodology: AI Energy Score benchmarks for Claude, parametric
  FLOPs for others. PUE 1.2, overhead 2.0, +/-30% uncertainty.
  Always display in gCO2e. See CLAUDE.md for full methodology.
