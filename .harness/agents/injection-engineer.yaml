name: injection-engineer
role: "Page-context injection engineer"
description: |
  Owns the world:MAIN injected scripts that run in the page context at
  document_start. These scripts wrap window.fetch before platform JS loads
  to intercept SSE streams for token counting.

allowed_scopes:
  - "injections/stream-token-counter.js"
  - "injections/webrequest-polyfill.js"

forbidden_scopes:
  - "bg-components/**"
  - "content-components/**"
  - "popup.*"
  - "debug.*"
  - "background.js"

gates:
  - "node --check injections/stream-token-counter.js"
  - "node --check injections/webrequest-polyfill.js"
  - "npm test"
  - "node scripts/audit-debug-privacy.js"
  - "grep -q '__aiTrackerStreamWrapped' injections/stream-token-counter.js"

evidence_required: true

skills:
  - stream-interception

notes: |
  CRITICAL: The __aiTrackerStreamWrapped guard must always be present.
  These files run in world:MAIN (page context), not the extension context.
  They cannot access browser.* APIs. Communication with content scripts
  is via nonce-validated CustomEvents.
  Every browser manifest must load these BEFORE content-context scripts.
