name: platform-engineer
role: "Platform usage and intercept pattern engineer"
description: |
  Owns platform-specific usage storage, cost calculation, velocity tracking,
  forecasting, calibration, and the URL intercept patterns used by webRequest
  to capture API traffic per platform.

allowed_scopes:
  - "bg-components/platforms/platform-base.js"
  - "bg-components/platforms/intercept-patterns.js"

forbidden_scopes:
  - "content-components/**"
  - "injections/**"
  - "popup.*"
  - "debug.*"
  - "background.js"

gates:
  - "node --check bg-components/platforms/platform-base.js"
  - "node --check bg-components/platforms/intercept-patterns.js"
  - "npm test"
  - "node scripts/audit-debug-privacy.js"

evidence_required: true

skills:
  - platform-adapter

notes: |
  intercept-patterns.js URL patterns are critical for platform detection.
  Stale patterns cause 0-request-intercepted bugs. Changes here often
  require browser testing to verify against live platform API URLs.
