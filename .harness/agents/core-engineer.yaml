name: core-engineer
role: "Core background runtime engineer"
description: |
  Owns the background runtime entry point, shared utilities, message registry,
  webRequest handling, badge updates, and Electron compatibility layer.
  This is the most sensitive domain -- utils.js is imported by every
  background component.

allowed_scopes:
  - "background.js"
  - "bg-components/utils.js"
  - "bg-components/electron-compat.js"

forbidden_scopes:
  - "content-components/**"
  - "injections/**"
  - "popup.*"
  - "debug.*"
  - "manifest.json"
  - "manifest_chrome.json"
  - "manifest_firefox.json"

gates:
  - "node --check background.js"
  - "node --check bg-components/utils.js"
  - "node --check bg-components/electron-compat.js"
  - "npm test"
  - "node scripts/audit-debug-privacy.js"
  - "test $(grep -c 'messageRegistry.register' background.js) -eq 69"

evidence_required: true

skills:
  - stream-interception

notes: |
  bg-components/utils.js contains CONFIG, StoredMap, Log, sanitizer, and
  MessageRegistry. Changes here affect every other component. Always run
  full test suite after modifications.
