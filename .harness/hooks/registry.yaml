hooks:
  pre_verify:
    command: "python3 scripts/run_checks.py quick"
    blocking: true
    description: "Run the quick verification gate before review"

  post_edit:
    command: "node scripts/check-dataclasses.js"
    blocking: false
    description: "Check shared/dataclasses.js sync after any edit"

  pre_commit:
    command: "npm run audit"
    blocking: true
    description: "Privacy regression guard before commit"

  pre_push:
    command: "python3 scripts/run_checks.py all"
    blocking: true
    description: "Full harness gate must pass before push"
