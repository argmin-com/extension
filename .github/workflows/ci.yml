name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dev tooling
        run: npm ci

      - name: Syntax check every JS file
        run: |
          fail=0
          while IFS= read -r f; do
            if ! node --check "$f" 2>err.log; then
              echo "::error file=$f::syntax error"
              cat err.log
              fail=1
            fi
          done < <(find . -name '*.js' -not -path '*/lib/*' -not -path '*/node_modules/*' -not -path '*/web-ext-artifacts/*')
          rm -f err.log
          exit $fail

      - name: Privacy + dataclasses audit
        run: npm run audit

      - name: Unit tests
        run: npm test

      - name: Parse manifest JSONs and locale messages
        run: |
          python3 -c "import json; json.load(open('manifest.json')); json.load(open('manifest_chrome.json')); json.load(open('_locales/en/messages.json'))"

      - name: messageRegistry.register handler count
        run: npm run check:handlers

      - name: Build Chrome and Firefox zips
        run: npm run release:all

      - name: Verify zip layout (manifest at root, no wrapper directory)
        run: npm run check:release-packages

      - name: Firefox extension lint
        run: |
          version="$(node -p "require('./package.json').version")"
          npx --no-install web-ext lint --source-dir "web-ext-artifacts/stage-firefox-${version}" --warnings-as-errors
