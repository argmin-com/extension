guardrails:
  - id: GR-001
    name: fail-open-violation
    severity: critical
    description: "No code path may block, delay, or degrade the user's ability to send messages on any platform."
    check: "grep -rn 'preventDefault' content-components/ injections/ platform-adapters/ | grep -v '// safe:' | grep -v '.md'"
    action: block
    rationale: "Fail-open is the top non-negotiable. Any blocking of user send actions is a showstopper."

  - id: GR-002
    name: external-network-call
    severity: critical
    description: "No unauthorized external network calls from extension code."
    check: "node scripts/audit-debug-privacy.js"
    action: block
    rationale: "Extension is local-only by default. Allowed feature-driven calls are supported platform session traffic, browser-extension local assets, opt-in Anthropic token counting, optional Frankfurter currency rates, and raw GitHub content for Claude GitHub sync token estimation."

  - id: GR-003
    name: world-main-guard
    severity: critical
    description: "The __aiTrackerStreamWrapped guard must exist in stream-token-counter.js to prevent double fetch wrapping."
    check: "grep -q '__aiTrackerStreamWrapped' injections/stream-token-counter.js"
    action: block
    rationale: "Without the guard, fetch() gets wrapped multiple times causing infinite loops or missed streams."

  - id: GR-004
    name: es-module-in-content
    severity: critical
    description: "No import/export statements in content scripts."
    check: "grep -rn '^import ' content-components/ injections/ | grep -v '// build-only'; grep -rn '^export ' content-components/ injections/ | grep -v '// build-only'"
    action: block
    rationale: "Content scripts run in a non-module context. ES module syntax causes silent failures."

  - id: GR-005
    name: manifest-order
    severity: critical
    description: "content_scripts order must be preserved in all browser manifests. world:MAIN injection entries come before content-context scripts."
    check: "node -e \"for (const f of ['manifest.json','manifest_chrome.json','manifest_firefox.json']) { const m=require('./'+f); const cs=m.content_scripts; const mainIdx=cs.findIndex(e=>e.world==='MAIN'); const contentIdx=cs.findIndex(e=>!e.world||e.world!=='MAIN'); if(mainIdx>=contentIdx&&contentIdx>=0){console.error(f); process.exit(1)} }\""
    action: block
    rationale: "The world:MAIN injection must wrap fetch() before any content script tries to use it."

  - id: GR-006
    name: html-injection
    severity: critical
    description: "No unsafe HTML rendering with interpolated variables."
    check: "node scripts/audit-debug-privacy.js"
    action: block
    rationale: "Dynamic HTML must go through audited helpers or DOM APIs. The privacy audit enforces safe interpolation patterns."

  - id: GR-007
    name: secrets-in-diff
    severity: critical
    description: "No API keys, tokens, or secrets in committed code."
    check: "git diff --cached | grep -iE '(api_key|secret|password|token|credential)\\s*[:=]\\s*[\"'\\'''][^\"'\\''']' | grep -v '// example' | grep -v '.md'"
    action: block
    rationale: "Secrets must never be committed to version control."

  - id: GR-008
    name: console-log-direct
    severity: high
    description: "All debug logging must use Log() not console.log directly."
    check: "grep -rn 'console\\.log' bg-components/ content-components/ background.js popup.js debug.js | grep -v '// allowed:' | grep -v 'Log('"
    action: warn
    rationale: "Log() applies the two-step sanitizer. Direct console.log bypasses privacy protections."

  - id: GR-009
    name: document-title-in-debug
    severity: high
    description: "No document.title in debug sender labels."
    check: "grep -rn 'document\\.title' bg-components/ content-components/ | grep -iv 'length\\|count\\|check'"
    action: warn
    rationale: "document.title may contain sensitive conversation content."

  - id: GR-010
    name: raw-uuid-in-log
    severity: high
    description: "No raw UUIDs or URLs in log callsites."
    check: "grep -rn 'Log(' bg-components/ content-components/ | grep -E '[0-9a-f]{8}-[0-9a-f]{4}'"
    action: warn
    rationale: "Raw identifiers in logs can leak session or conversation context."

  - id: GR-011
    name: suppress-gate-failure
    severity: critical
    description: "No || true or similar suppression in verification gate commands."
    check: "grep -rn '|| true' scripts/ orchestration/ .harness/"
    action: block
    rationale: "Suppressing gate failures defeats the purpose of verification."

  - id: GR-012
    name: overclaim-autonomous
    severity: high
    description: "Agents must not claim tasks outside their declared domain without coordination."
    check: "manual review"
    action: warn
    rationale: "Domain boundaries prevent conflicting edits and maintain separation of concerns."

  - id: GR-013
    name: new-dependency
    severity: high
    description: "New dependencies in package.json require explicit approval."
    check: "git diff --cached package.json | grep '^+.*\"dependencies\\|devDependencies'"
    action: warn
    rationale: "This is a zero-dependency extension (aside from test tooling). New deps add attack surface."

  - id: GR-014
    name: privacy-regression
    severity: critical
    description: "audit-debug-privacy.js must pass on all changes."
    check: "node scripts/audit-debug-privacy.js"
    action: block
    rationale: "Privacy is a core promise. Regressions in logging or data handling are not acceptable."

  - id: GR-015
    name: dataclass-drift
    severity: high
    description: "shared/dataclasses.js and content-components/ui_dataclasses.js must be in sync."
    check: "node scripts/check-dataclasses.js"
    action: warn
    rationale: "Drift between the ES module source and generated content script version causes runtime errors."

  - id: GR-016
    name: handler-count-drift
    severity: high
    description: "messageRegistry.register count in background.js must be tracked."
    check: "test $(grep -c 'messageRegistry.register' background.js) -eq 69"
    action: warn
    rationale: "Handler count changes indicate new or removed message handlers that need review."

  - id: GR-017
    name: destructive-command-guard
    severity: critical
    description: "No destructive git commands (force push, reset --hard, clean -f, branch -D on main)."
    check: "manual review"
    action: block
    rationale: "Destructive commands can cause irreversible data loss."

  - id: GR-018
    name: self-reported-gate-pass
    severity: critical
    description: "Agents must not claim gates passed without machine-verifiable evidence."
    check: "manual review"
    action: block
    rationale: "All verification must produce captured stdout/stderr. 'I ran the tests and they passed' is not evidence."

  - id: GR-019
    name: fix-without-investigation
    severity: high
    description: "Do not apply fixes without first understanding the root cause."
    check: "manual review"
    action: warn
    rationale: "Blind fixes often introduce new bugs. Investigate before patching."

  - id: GR-020
    name: em-dash-in-output
    severity: high
    description: "No em dashes in any output (code, logs, UI text)."
    check: "grep -rPn '\\x{2014}' bg-components/ content-components/ popup.js popup.html debug.js debug.html"
    action: warn
    rationale: "Project style rule: use -- (double hyphen) instead of em dashes."
